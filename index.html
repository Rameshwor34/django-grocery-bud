<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Bud</title>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

  <!-- same css files as your project -->
  <link rel="stylesheet" href="static/grocery/css/global.css">
  <link rel="stylesheet" href="static/grocery/css/single-item.css">
  <link rel="stylesheet" href="static/grocery/css/items.css">
  <link rel="stylesheet" href="static/grocery/css/form.css">
</head>

<body>

<section class="section-center">

  <form>
    <h2>grocery bud</h2>

    <div class="form-control">
      <input
      type="text"
      class="form-input"
      placeholder="e.g. eggs">

      <button type="submit" class="btn">
        add item
      </button>
    </div>
  </form>

  <!-- Items List -->

  <div class="items">

    <div class="single-item">

      <input type="checkbox">

      <p>eggs</p>

      <a href="#" class="btn icon-btn edit-btn">
        <i class="fa-regular fa-pen-to-square"></i>
      </a>

      <button class="btn icon-btn remove-btn">
        <i class="fa-regular fa-trash-can"></i>
      </button>

    </div>

    <div class="single-item">

      <input type="checkbox">

      <p>milk</p>

      <a href="#" class="btn icon-btn edit-btn">
        <i class="fa-regular fa-pen-to-square"></i>
      </a>

      <button class="btn icon-btn remove-btn">
        <i class="fa-regular fa-trash-can"></i>
      </button>

    </div>

  </div>

</section>

</body>
</html>
